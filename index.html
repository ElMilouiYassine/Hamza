<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamza RH – Vivier sécurisé</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <!-- ✅ Version ajoutée pour casser le cache -->
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <!-- HEADER (caché tant que non connecté) -->
  <header class="app-header" id="main-header" style="display:none;">
    <div class="header-brand">
      <h2>📋 Hamza RH</h2>
      <span class="project-tag">Projet RH</span>
    </div>
    <div class="header-user">
      <span class="user-name" id="current-user"></span>
      <span class="role-badge">Gestion RH</span>
      <button class="btn btn-ghost" id="logout-btn">Se déconnecter</button>
    </div>
  </header>

  <div id="root"></div>

  <!-- FOOTER (caché tant que non connecté) -->
  <footer class="app-footer" id="main-footer" style="display:none;">
    <div class="footer-left">
      <span class="footer-dot"></span>
      <strong>Hamza</strong> · Gestion des Ressources Humaines
    </div>
    <div class="footer-right">
      <span>© 2024 Hamza RH</span>
      <span style="font-family: 'IBM Plex Mono', monospace;">v1.0</span>
    </div>
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://rjqcbrwyqpfhrftfsdvy.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_dlYCOUdp8yDEpZ9gWxEBXw_XwoMsQ_V'
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ---------- CONSTANTES ----------
    const METIERS = ['Chef gérant','Second de cuisine','Pâtissier','Chef pâtissier','EDR']
    const SOURCES = ['Pôle Emploi','LinkedIn','Cooptation','Indeed','Candidature spontanée','Autre']
    const DEPARTMENTS = {
      '75':['Paris',48.8566,2.3522],'77':['Seine-et-Marne',48.5389,2.6600],
      '78':['Yvelines',48.8049,2.1204],'91':['Essonne',48.6280,2.4300],
      '92':['Hauts-de-Seine',48.8924,2.2160],'93':['Seine-Saint-Denis',48.9092,2.4392],
      '94':['Val-de-Marne',48.7904,2.4556],'95':["Val-d'Oise",49.0361,2.0770]
    }
    const DEPT_CODES = Object.keys(DEPARTMENTS).sort()
    const PAGE_SIZE = 10

    // ---------- ÉTAT ----------
    let candidats = []
    let filters = { q:'', statut:'', source:'', departement:'', favorisOnly:false, dispoAvant:'' }
    let sort = { col:null, asc:true }
    let page = 1
    let proximityDept = ''
    let editingId = null
    let expandedNotes = new Set()
    let currentUserEmail = ''

    // ---------- AUTHENTIFICATION ----------
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession()
      if (session) {
        currentUserEmail = session.user.email
        document.getElementById('main-header').style.display = 'flex'
        document.getElementById('main-footer').style.display = 'flex'
        document.getElementById('current-user').textContent = currentUserEmail
        await loadFromSupabase()
        subscribeToChanges()
        renderApp()
      } else {
        document.getElementById('main-header').style.display = 'none'
        document.getElementById('main-footer').style.display = 'none'
        renderLogin()
      }
    }

    function renderLogin() {
      root.innerHTML = `
        <div class="auth-container">
          <h2>🔐 Connexion</h2>
          <form id="login-form">
            <div class="field">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" required autofocus>
            </div>
            <div class="field">
              <label for="login-password">Mot de passe</label>
              <input type="password" id="login-password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
          </form>
          <div id="auth-error" style="color:var(--danger); margin-top:8px;"></div>
        </div>
      `

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const email = document.getElementById('login-email').value
        const password = document.getElementById('login-password').value
        const { error } = await supabase.auth.signInWithPassword({ email, password })
        if (error) {
          document.getElementById('auth-error').textContent = error.message
        } else {
          checkSession()
        }
      })
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      checkSession()
    })

    // ---------- SUPABASE CRUD ----------
    async function loadFromSupabase() {
      const { data, error } = await supabase
        .from('candidats')
        .select('*')
        .order('updated_at', { ascending: false })
      if (error) {
        showToast('Erreur de chargement : ' + error.message)
        return
      }
      candidats = data.map(row => row.data)
    }

    async function saveToSupabase(record) {
      const { error } = await supabase
        .from('candidats')
        .upsert({
          id: record.id,
          data: record,
          updated_at: new Date().toISOString()
        })
      if (error) {
        showToast('Erreur de sauvegarde : ' + error.message)
        return false
      }
      return true
    }

    async function deleteFromSupabase(id) {
      const { error } = await supabase
        .from('candidats')
        .delete()
        .eq('id', id)
      if (error) {
        showToast('Erreur de suppression : ' + error.message)
        return false
      }
      return true
    }

    function subscribeToChanges() {
      supabase
        .channel('public:candidats')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'candidats' }, () => {
          loadFromSupabase().then(() => renderApp())
        })
        .subscribe()
    }

    // ---------- LOGIQUE MÉTIER ----------
    function uid(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,7) }
    function daysUntil(dateStr){
      const today = new Date(); today.setHours(0,0,0,0)
      const d = new Date(dateStr+'T00:00:00')
      return Math.round((d - today)/86400000)
    }
    function computeStatusClass(c){
      if(c.dispoType === 'now') return 'now'
      if(c.dispoType === 'future') return daysUntil(c.dispoDate) <= 21 ? 'soon' : 'soon'
      return 'mission'
    }
    function distanceKm(dep1, dep2){
      const a = DEPARTMENTS[dep1], b = DEPARTMENTS[dep2]
      if(!a || !b) return null
      const R = 6371
      const dLat = (b[1]-a[1])*Math.PI/180, dLon = (b[2]-a[2])*Math.PI/180
      const lat1 = a[1]*Math.PI/180, lat2 = b[1]*Math.PI/180
      const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2
      return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))
    }
    function getFilteredAndSorted(){
      let filtered = candidats.filter(c => {
        const q = filters.q.toLowerCase()
        if(q && ![c.nom,c.metier,c.localisation,c.notes,c.source].join(' ').toLowerCase().includes(q)) return false
        if(filters.statut && computeStatusClass(c) !== filters.statut) return false
        if(filters.source && c.source !== filters.source) return false
        if(filters.departement && c.departement !== filters.departement) return false
        if(filters.favorisOnly && !c.favorite) return false
        if(filters.dispoAvant) {
          if(c.dispoType === 'now') return true
          if(c.dispoDate && c.dispoDate <= filters.dispoAvant) return true
          return false
        }
        return true
      })
      if(sort.col){
        filtered.sort((a,b) => {
          let va = a[sort.col] || '', vb = b[sort.col] || ''
          if(sort.col === 'dispoDate'){
            va = a.dispoDate || '9999-99-99'; vb = b.dispoDate || '9999-99-99'
          }
          if(va < vb) return sort.asc ? -1 : 1
          if(va > vb) return sort.asc ? 1 : -1
          return 0
        })
      } else {
        filtered.sort((a,b) => {
          const ra = a.dispoType === 'now' ? 0 : (a.dispoType === 'future' ? 1 : 2)
          const rb = b.dispoType === 'now' ? 0 : (b.dispoType === 'future' ? 1 : 2)
          if(ra !== rb) return ra - rb
          if(a.dispoDate && b.dispoDate) return daysUntil(a.dispoDate) - daysUntil(b.dispoDate)
          return (a.nom || '').localeCompare(b.nom || '')
        })
      }
      if(proximityDept){
        filtered.sort((a,b) => {
          const dA = a.departement ? distanceKm(proximityDept, a.departement) : 999999
          const dB = b.departement ? distanceKm(proximityDept, b.departement) : 999999
          return dA - dB
        })
      }
      return filtered
    }
    function paginate(arr){
      const start = (page-1)*PAGE_SIZE
      return arr.slice(start, start+PAGE_SIZE)
    }
    function statusBadge(c){
      if(c.dispoType === 'now') return '<span class="badge now"><span class="dot"></span>Disponible maintenant</span>'
      if(c.dispoType === 'future'){
        const dj = daysUntil(c.dispoDate)
        const label = dj <= 0 ? "dès aujourd'hui" : `dans ${dj} j`
        return `<span class="badge soon"><span class="dot"></span>Dispo à partir du ${fmtDate(c.dispoDate)}</span><div class="countdown">${label}</div>`
      }
      const dj = c.dispoDate ? daysUntil(c.dispoDate) : null
      return `<span class="badge mission"><span class="dot"></span>En mission jusqu'au ${fmtDate(c.dispoDate) || '—'}</span>${dj!==null ? `<div class="countdown">fin dans ${dj} j</div>` : ''}`
    }
    function fmtDate(d){ if(!d) return ''; const [y,m,day]=d.split('-'); return day+'/'+m+'/'+y }
    function escapeHTML(str) {
      const div = document.createElement('div')
      div.appendChild(document.createTextNode(str))
      return div.innerHTML
    }

    // ---------- RENDU APPLICATION ----------
    function renderApp(){
      const allFiltered = getFilteredAndSorted()
      const paged = paginate(allFiltered)
      const totalPages = Math.ceil(allFiltered.length/PAGE_SIZE)
      const nowCount = candidats.filter(c => c.dispoType === 'now').length
      const soonCount = candidats.filter(c => c.dispoType === 'future' && daysUntil(c.dispoDate) <= 30).length

      root.innerHTML = `
      <div class="wrap">
        <div class="db-indicator">🔗 Base connectée · Supabase</div>
        <p class="eyebrow">Recrutement · Suivi partagé</p>
        <h1>Vivier de candidats</h1>
        <div class="stats">
          <div class="stat"><div class="n">${candidats.length}</div><div class="l">Profils</div></div>
          <div class="stat now"><div class="n">${nowCount}</div><div class="l">Dispo maintenant</div></div>
          <div class="stat soon"><div class="n">${soonCount}</div><div class="l">Dispo ≤ 30 j</div></div>
        </div>

        <div class="search-row">
          <input id="search" type="text" placeholder="Rechercher…" value="${escapeHTML(filters.q)}"/>
        </div>

        <div class="toolbar">
          <select id="prox-select">
            <option value="">Trier par proximité…</option>
            ${DEPT_CODES.map(c => `<option value="${c}" ${proximityDept===c?'selected':''}>${c} – ${DEPARTMENTS[c][0]}</option>`).join('')}
          </select>
          <select id="f-statut">
            <option value="">Tous statuts</option>
            <option value="now" ${filters.statut==='now'?'selected':''}>Dispo maintenant</option>
            <option value="soon" ${filters.statut==='soon'?'selected':''}>Dispo bientôt</option>
            <option value="mission" ${filters.statut==='mission'?'selected':''}>En mission</option>
          </select>
          <select id="f-source">
            <option value="">Toutes sources</option>
            ${SOURCES.map(s => `<option ${filters.source===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <select id="f-departement">
            <option value="">Tous départements</option>
            ${DEPT_CODES.map(c => `<option value="${c}" ${filters.departement===c?'selected':''}>${c} – ${DEPARTMENTS[c][0]}</option>`).join('')}
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="f-fav" ${filters.favorisOnly?'checked':''}> ⭐ Favoris uniquement
          </label>
          <input type="date" id="f-dispo-avant" value="${filters.dispoAvant}" title="Disponibles avant le…" style="width:150px;"/>
          <button class="btn btn-primary" id="add-btn">+ Ajouter un profil</button>
          <button class="btn btn-ghost" id="refresh-btn">🔄 Actualiser</button>
        </div>

        ${allFiltered.length === 0 ? `
          <div class="empty"><p>Aucun profil trouvé.</p></div>
        ` : `
          <div style="font-size:13px;color:var(--ink-soft);margin-bottom:8px;">
            ${allFiltered.length} candidat(s) trouvé(s) · Page ${page}/${totalPages}
          </div>
          <table>
            <thead>
              <tr>
                <th class="${sort.col==='nom'?'sorted':''}" data-sort="nom">Nom</th>
                <th class="${sort.col==='metier'?'sorted':''}" data-sort="metier">Métier</th>
                <th class="${sort.col==='localisation'?'sorted':''}" data-sort="localisation">Localisation</th>
                <th class="${sort.col==='source'?'sorted':''}" data-sort="source">Source</th>
                <th>Disponibilité</th>
                <th>Notes</th>
                <th>CV</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${paged.map(c => `
                <tr class="st-${computeStatusClass(c)}" data-id="${c.id}">
                  <td>
                    <span class="favorite ${c.favorite?'is-fav':''}" data-fav="${c.id}">${c.favorite?'★':'☆'}</span>
                    <span class="name">${escapeHTML(c.nom)}</span>
                    ${c.telephone ? `<div class="meta">${escapeHTML(c.telephone)}</div>` : ''}
                  </td>
                  <td>${escapeHTML(c.metier || '—')}</td>
                  <td>
                    ${escapeHTML(c.localisation || '—')}${c.departement ? ` <span class="meta">(${c.departement})</span>` : ''}
                    ${proximityDept && c.departement ? `<div class="countdown">≈ ${distanceKm(proximityDept, c.departement)} km</div>` : ''}
                  </td>
                  <td>${escapeHTML(c.source || '—')}</td>
                  <td>${statusBadge(c)}</td>
                  <td>
                    <div class="notes ${expandedNotes.has(c.id) ? 'expanded':''}" data-toggle="${c.id}">${c.notes ? escapeHTML(c.notes) : '—'}</div>
                  </td>
                  <td>
                    ${(c.cvFile || c.cvLink) ? `<button class="cv-btn" data-cv="${c.id}">📄 Voir</button>` : '<span class="cv-none">—</span>'}
                  </td>
                  <td>
                    <div class="actions">
                      <button data-edit="${c.id}">Modifier</button>
                      <button class="btn-danger-text" data-del="${c.id}">Supprimer</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="pagination">
            <button class="btn btn-ghost" id="prev-page" ${page<=1?'disabled':''}>← Précédent</button>
            <span>Page</span>
            <select id="page-select">
              ${Array.from({length:totalPages},(_,i)=>`<option ${page===i+1?'selected':''}>${i+1}</option>`).join('')}
            </select>
            <span>/ ${totalPages}</span>
            <button class="btn btn-ghost" id="next-page" ${page>=totalPages?'disabled':''}>Suivant →</button>
          </div>
        `}
      </div>
      `

      // Attacher les événements
      document.getElementById('search')?.addEventListener('input', e => { filters.q = e.target.value; page=1; renderApp() })
      document.getElementById('prox-select')?.addEventListener('change', e => { proximityDept = e.target.value; page=1; renderApp() })
      document.getElementById('f-statut')?.addEventListener('change', e => { filters.statut = e.target.value; page=1; renderApp() })
      document.getElementById('f-source')?.addEventListener('change', e => { filters.source = e.target.value; page=1; renderApp() })
      document.getElementById('f-departement')?.addEventListener('change', e => { filters.departement = e.target.value; page=1; renderApp() })
      document.getElementById('f-fav')?.addEventListener('change', e => { filters.favorisOnly = e.target.checked; page=1; renderApp() })
      document.getElementById('f-dispo-avant')?.addEventListener('change', e => { filters.dispoAvant = e.target.value; page=1; renderApp() })
      document.getElementById('add-btn')?.addEventListener('click', () => openForm(null))
      document.getElementById('refresh-btn')?.addEventListener('click', () => loadFromSupabase().then(() => renderApp()))

      document.querySelectorAll('[data-sort]').forEach(th => {
        th.onclick = () => {
          const col = th.dataset.sort
          if(sort.col === col) sort.asc = !sort.asc
          else { sort.col = col; sort.asc = true }
          page=1
          renderApp()
        }
      })

      document.getElementById('prev-page')?.addEventListener('click', ()=>{ if(page>1){ page--; renderApp() } })
      document.getElementById('next-page')?.addEventListener('click', ()=>{ if(page<totalPages){ page++; renderApp() } })
      document.getElementById('page-select')?.addEventListener('change', e=>{ page = parseInt(e.target.value); renderApp() })

      document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => openForm(b.dataset.edit))
      document.querySelectorAll('[data-del]').forEach(b => b.onclick = () => openConfirmDelete(b.dataset.del))
      document.querySelectorAll('[data-cv]').forEach(b => b.onclick = () => openCV(b.dataset.cv))
      document.querySelectorAll('[data-toggle]').forEach(el => el.onclick = () => {
        const id = el.dataset.toggle
        expandedNotes.has(id) ? expandedNotes.delete(id) : expandedNotes.add(id)
        renderApp()
      })
      document.querySelectorAll('[data-fav]').forEach(el => {
        el.onclick = (e) => {
          e.stopPropagation()
          const id = el.dataset.fav
          const c = candidats.find(x => x.id === id)
          if(c){ c.favorite = !c.favorite; saveToSupabase(c); renderApp() }
        }
      })
    }

    // ---------- MODALES ----------
    function openCV(id){ /* ... même code ... */ }
    function showToast(msg){ /* ... même code ... */ }
    function openForm(id){ /* ... même code ... */ }
    function openConfirmDelete(id){ /* ... même code ... */ }

    // ---------- LANCEMENT ----------
    checkSession()
  </script>
</body>
</html>
